name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Compile autoeq
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install compiler
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Build
        run: cc src/*.c -lm -o autoeq

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: autoeq-linux
          path: autoeq